aid: azure-container-instances
name: Azure Container Instances
description: >-
  Azure Container Instances (ACI) is the fastest and simplest way to run
  containers in Azure without having to manage virtual machines or adopt a
  higher-level orchestration service. It offers serverless containers with
  per-second billing, custom sizes, and seamless integration with the Azure
  ecosystem for burst and event-driven workloads.
