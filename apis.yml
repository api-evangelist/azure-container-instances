apis:
  - aid: azure-container-instances:azure-container-instances
    name: Azure Container Instances
    description: >-
      Azure Container Instances is a service that enables you to run containers
      directly on the Microsoft Azure cloud without managing virtual machines
      or adopting orchestration services. It provides fast startup times,
      per-second billing, custom CPU and memory sizing, and persistent storage
      with Azure Files integration for both Linux and Windows containers.
